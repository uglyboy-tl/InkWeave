name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Check
        run: bun run check

      - name: Publish packages
        run: |
          npm publish --workspace @inkweave/core --access public
          npm publish --workspace @inkweave/react --access public
          npm publish --workspace @inkweave/plugins --access public
          npm publish --workspace @inkweave/web --access public

      - name: Extract release notes
        run: |
          VERSION=${{ github.ref_name }}
          sed -n "/^## ${VERSION}/,/^## /p" CHANGELOG.md | sed '1d;$d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::No release notes found for ${VERSION}"
            echo "No release notes available." > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
