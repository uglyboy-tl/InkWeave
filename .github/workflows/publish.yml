name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2


      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build:pkg && bun run build:web

      - name: Check
        run: bun run check

      - name: Publish packages
        run: |
          bun publish --access public  --cwd="packages/core"
          bun publish --access public --cwd="packages/react"
          bun publish --access public --cwd="packages/plugins"
          bun publish --access public --cwd="packages/web"
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes
        run: |
          VERSION=${{ github.ref_name }}
          sed -n "/^## ${VERSION}/,/^## /p" CHANGELOG.md | sed '1d;$d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::No release notes found for ${VERSION}"
            echo "No release notes available." > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            packages/web/dist/inkweave.min.js
            packages/web/dist/inkweave.min.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
