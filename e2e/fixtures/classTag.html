<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Tag E2E Test</title>
  <script src="../../packages/web/dist/inkweave.min.js"></script>
  <style>
    .highlight { color: red; font-weight: bold; }
    .bold { font-weight: bold; }
    .italic { font-style: italic; }
    .center { text-align: center; }
  </style>
</head>
<body>
  <div id="story-container"></div>
  
  <script>
    const storyContent = `
# class: highlight
Hello, this text should be highlighted!
# class: bold italic
This text should be bold and italic.
# class: center
This text should be centered.
Plain text without classes.
    `.trim();

    InkWeave.init({
      container: '#story-container',
      story: storyContent,
      title: 'Class Tag E2E Test'
    });
  </script>
</body>
</html>
