<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - Conditional Blocks</title>
  <link rel="stylesheet" href="../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

VAR met_blofeld = false

-> start

=== start ===
* [Meet Blofeld]
    ~ met_blofeld = true
    You meet Blofeld.
    -> check_status
* [Check status]
    -> check_status

=== check_status ===
{met_blofeld: "You have met Blofeld." | "You haven't met Blofeld yet."}
-> END
`,
      title: "Conditional Blocks Test",
    });
  </script>
</body>
</html>
