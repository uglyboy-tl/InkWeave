<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - International Characters</title>
  <link rel="stylesheet" href="../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

// Cyrillic variable
VAR прівет = "Cyrillic greeting"

// Greek variable
VAR καλημέρα = "Greek greeting"

-> start

=== start ===
Cyrillic variable: {прівет}
Greek variable: {καλημέρα}
* [Показать русский текст]
    Это русский текст.
    -> start
* [Ελληνικό κείμενο]
    Αυτό είναι ελληνικό κείμενο.
    -> start
* [End]
    -> END
`,
      title: "International Characters Test",
    });
  </script>
</body>
</html>
