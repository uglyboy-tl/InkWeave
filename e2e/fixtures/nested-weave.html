<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - Nested Weave</title>
  <link rel="stylesheet" href="../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

- "Well, Poirot? Murder or suicide?"
	* "Murder!"
	 	"And who did it?"
		* * "The butler!"
		* * "The gardener!"
	* "Suicide!"
		"Are you quite sure?"
		* * "Quite sure."
		* * "It is obvious."
	- Mrs. Christie lowered her manuscript.
-> END
`,
      title: "Nested Weave Test",
    });
  </script>
</body>
</html>
