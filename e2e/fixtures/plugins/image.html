<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Plugin Test - Combined</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
    }
    #app {
      max-width: 800px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    // Combined test story with error first then valid flow
    const story = `
# COMBINED IMAGE TEST

This is a combined test for image plugin.

# image: nonexistent-first.jpg

You should not see an image above this text.

* [Go to valid image flow]
  -> valid_flow

== valid_flow ==
# image: assets/test-image.png

This is a test for complete image flow.

* [Load non-existent image]
  # image: nonexistent-image.jpg
  The image should not display, but content should continue.
  -> END

* [Replace with different image]
  # image: assets/test-image2.png
  The original image should be replaced with a different one.
  -> END

* [Clear the image]
  # clear
  The image should be cleared.
  ** [Show image again]
    # image: assets/test-image.png
    The image should appear again.
    -> END
`;
    
    InkWeave.init({
      container: '#app',
      story: story,
      plugins: {
        'image': true,
        'audio': false,
        'auto-restore': false,
        'auto-save': false,
        'fade-effect': false,
        'scroll-after-choice': false,
        'link-open': false,
        'memory': false,
        'auto-button': false,
        'cd-button': false,
        'class-tag': false
      }
    });
  </script>
</body>
</html>
