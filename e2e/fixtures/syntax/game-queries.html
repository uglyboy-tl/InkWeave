<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - Game Queries</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

-> start

=== start ===
* [Check CHOICE_COUNT]
    ~ temp count = CHOICE_COUNT()
    Choice count: {count}
    -> check_turns
-> DONE

=== check_turns ===
* [Check TURNS]
    ~ temp turns = TURNS()
    Turns taken: {turns}
    -> start
-> DONE
`,
      title: "Game Queries Test",
    });
  </script>
</body>
</html>
