<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - Basic Lists</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

LIST kettleState = cold, boiling, recently_boiled
~ kettleState = cold

-> start

=== start ===
* [Set kettle to cold]
    ~ kettleState = cold
    Kettle is now: {kettleState}
    -> start
* [Set kettle to boiling]
    ~ kettleState = boiling
    Kettle is now: {kettleState}
    -> start
* [Check if cold]
    {kettleState == cold:
        Kettle is cold.
    - else:
        Kettle is not cold.
    }
    -> start
`,
      title: "Basic Lists Test",
    });
  </script>
</body>
</html>
