<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - List Intersection</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

LIST CoreValues = strength, courage, compassion, greed, nepotism, self_belief

VAR desiredValues = (strength, courage, compassion, self_belief)
VAR actualValues = (greed, nepotism, self_belief)

-> start

=== start ===
Desired: {desiredValues}
Actual: {actualValues}
* [Check overlap]
    ~ temp overlap = desiredValues ^ actualValues
    Common values: {overlap}
    -> start
* [Check has any common]
    {desiredValues ^ actualValues:
        Has at least one common value.
    - else:
        No common values.
    }
    -> start
`,
      title: "List Intersection Test",
    });
  </script>
</body>
</html>
