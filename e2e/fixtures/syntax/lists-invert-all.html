<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - List Invert and All</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

LIST GuardsOnDuty = Smith, Jones, Carter, Braithwaite

VAR onDuty = (Smith, Jones)

-> start

=== start ===
On duty: {onDuty}
* [Change guard]
    ~ onDuty = LIST_INVERT(onDuty)
    Now on duty: {onDuty}
    -> start
* [List all guards]
    All guards: {LIST_ALL(GuardsOnDuty)}
    -> start
* [Check onDuty count]
    ~ temp count = LIST_COUNT(onDuty)
    Guards on duty: {count}
    -> start
`,
      title: "List Invert and All Test",
    });
  </script>
</body>
</html>
