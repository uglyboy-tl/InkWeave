<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - Multivalued Lists</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

LIST skills = strong, fast, smart

VAR heroSkills = strong

-> start

=== start ===
Skills: {heroSkills}
* [Add fast skill]
    ~ heroSkills = heroSkills + fast
    Now have: {heroSkills}
    -> start
* [Add smart skill]
    ~ heroSkills = heroSkills + smart
    Now have: {heroSkills}
    -> start
* [Check has strong]
    {heroSkills has strong:
        Hero is strong.
    - else:
        Hero is not strong.
    }
    -> start
`,
      title: "Multivalued Lists Test",
    });
  </script>
</body>
</html>
