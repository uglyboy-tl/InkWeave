<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - Logic Operators</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

VAR visited_london = false
VAR visited_paris = false
VAR visited_rome = false
VAR score = 0

-> start

=== start ===
* {not visited_london} [Visit London]
    ~ visited_london = true
    You visit London.
    -> start
* {visited_london && not visited_paris} [Go to Paris]
    ~ visited_paris = true
    You travel to Paris.
    -> start
* {visited_london && visited_paris && not visited_rome} [Visit Rome]
    ~ visited_rome = true
    You reach Rome.
    -> start
* {visited_london && visited_paris && visited_rome} [All cities visited]
    You have completed the tour!
    -> END
* {score > 5} [High score option]
    Your score is high enough!
    -> END
* {score <= 5} [Low score option]
    Your score is too low.
    -> END
`,
      title: "Logic Operators Test",
    });
  </script>
</body>
</html>
