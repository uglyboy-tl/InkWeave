<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - OR Operator</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

VAR has_key = false
VAR has_lockpick = false
VAR visited_city = false
VAR visited_town = false

-> start

=== start ===
* {has_key || has_lockpick} [Open the door]
    You open the door successfully!
    -> END
* [Get key]
    ~ has_key = true
    You pick up the key.
    -> start
* [Get lockpick]
    ~ has_lockpick = true
    You pick up the lockpick.
    -> start
* {visited_city || visited_town} [Report your travels]
    You have traveled somewhere!
    -> END
* [Visit city]
    ~ visited_city = true
    You visit the city.
    -> start
* [Visit town]
    ~ visited_town = true
    You visit the town.
    -> start
`,
      title: "OR Operator Test",
    });
  </script>
</body>
</html>
