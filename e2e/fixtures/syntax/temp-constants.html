<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - Temp Variables and Constants</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

CONST DETECTIVE = "Poirot"
CONST ASSISTANT = "Hastings"

VAR current_character = DETECTIVE

-> temp_test

=== temp_test ===
Detective: {current_character}
~ temp score = 0
~ score = score + 10
Score: {score}
* [Add more]
    ~ temp bonus = 5
    ~ score = score + bonus
    Score with bonus: {score}
    -> END
* [End]
    -> END
`,
      title: "Temp Variables and Constants Test",
    });
  </script>
</body>
</html>
