<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - TURNS Query</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

-> game_start

=== game_start ===
Welcome to the counting game!
Current turn: {TURNS()}
* [Count to 1]
    You count: one.
    -> game_loop
* [Check turns since start]
    ~ temp since = TURNS_SINCE(-> game_start)
    Turns since start: {since}
    -> game_loop

=== game_loop ===
Turn: {TURNS()}
* [Count again]
    You count again.
    -> game_loop
* [Check turns since game_start]
    ~ temp since = TURNS_SINCE(-> game_start)
    Turns since game_start: {since}
    -> game_loop
* [End game]
    Game over!
    -> END
`,
      title: "TURNS Query Test",
    });
  </script>
</body>
</html>
