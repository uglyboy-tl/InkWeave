<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Ink Syntax - Weave Labels</title>
  <link rel="stylesheet" href="../../../packages/web/dist/inkweave.min.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #app { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 1.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../../packages/web/dist/inkweave.min.js"></script>
  <script>
    InkWeave.init({
      container: '#app',
      story: `
# linedelay:0

-> meet_guard

=== meet_guard ===
The guard frowns at you.

* (greet) [Greet him]
	'Greetings.'
* (get_out) 'Get out of my way[.'],' you tell the guard.

- (after_choice)
	'Hmm,' replies the guard.

* {greet} 'Having a nice day?'

* {get_out} [Shove him aside]
	You shove him sharply.
	-> fight_guard

- 'Mff,' the guard replies. 'Toffee?'
-> END

=== fight_guard ===
You engage the guard in combat.
-> END
`,
      title: "Weave Labels Test",
    });
  </script>
</body>
</html>
